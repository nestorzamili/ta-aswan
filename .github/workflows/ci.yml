name: CI ta-aswan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ta-aswan-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: PHP Lint & Composer Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240
        with:
          php-version: "8.2"
          extensions: intl, mysqli, pdo_mysql, zip
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-ansi

      - name: PHP Syntax Check
        run: find app/ -name "*.php" -print0 | xargs -0 -n1 php -l
