name: Deploy ta-aswan

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ta-aswan

permissions:
  contents: read

concurrency:
  group: ta-aswan-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.vars.outputs.image_ref }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive image tag
        id: vars
        run: |
          IMAGE_TAG="$(git rev-parse --short=7 "$GITHUB_SHA")"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.image_ref }},${{ env.IMAGE_NAME }}:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_vm:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build_and_push
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy stack on VM
        env:
          IMAGE_REF: ${{ needs.build_and_push.outputs.image_ref }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          VM_SSH_TARGET: ${{ secrets.VM_SSH_TARGET }}
          VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_SSH_KNOWN_HOSTS: ${{ secrets.VM_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          DEPLOY_PATH="/opt/ta-aswan"
          SSH_DIR="$(mktemp -d)"
          ENV_FILE="$(mktemp)"

          cleanup() {
            rm -rf "$SSH_DIR"
            rm -f "$ENV_FILE"
          }
          trap cleanup EXIT

          : "${IMAGE_REF:?Missing required environment variable: IMAGE_REF}"
          : "${APP_ENV_FILE:?Missing required environment variable: APP_ENV_FILE}"
          : "${VM_SSH_TARGET:?Missing required environment variable: VM_SSH_TARGET}"
          : "${VM_SSH_KEY:?Missing required environment variable: VM_SSH_KEY}"
          : "${VM_SSH_KNOWN_HOSTS:?Missing required environment variable: VM_SSH_KNOWN_HOSTS}"

          printf '%s\n' "$VM_SSH_KEY" > "$SSH_DIR/id_ed25519"
          chmod 600 "$SSH_DIR/id_ed25519"
          printf '%s\n' "$VM_SSH_KNOWN_HOSTS" > "$SSH_DIR/known_hosts"
          chmod 644 "$SSH_DIR/known_hosts"
          printf '%s\n' "$APP_ENV_FILE" > "$ENV_FILE"
          chmod 600 "$ENV_FILE"

          if [[ ! "$VM_SSH_TARGET" =~ ^([^@]+)@([^:]+):([0-9]+)$ ]]; then
            echo "VM_SSH_TARGET must use the format user@host:port" >&2
            exit 1
          fi

          VM_USER="${BASH_REMATCH[1]}"
          VM_HOST="${BASH_REMATCH[2]}"
          VM_SSH_PORT="${BASH_REMATCH[3]}"

          SSH_OPTS=(
            -i "$SSH_DIR/id_ed25519"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$SSH_DIR/known_hosts"
            -p "$VM_SSH_PORT"
          )
          SCP_OPTS=(
            -i "$SSH_DIR/id_ed25519"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$SSH_DIR/known_hosts"
            -P "$VM_SSH_PORT"
          )
          SSH_TARGET="$VM_USER@$VM_HOST"

          ssh "${SSH_OPTS[@]}" "$SSH_TARGET" "mkdir -p '$DEPLOY_PATH'"
          scp "${SCP_OPTS[@]}" "$ENV_FILE" "$SSH_TARGET:$DEPLOY_PATH/.env"

          printf -v q_image_ref '%q' "$IMAGE_REF"
          printf -v q_deploy_path '%q' "$DEPLOY_PATH"

          ssh "${SSH_OPTS[@]}" "$SSH_TARGET" \
            "IMAGE_REF=$q_image_ref DEPLOY_PATH=$q_deploy_path bash -se" <<'EOF'
          set -euo pipefail

          DOCKER_CONFIG_DIR="$(mktemp -d)"
          cleanup_remote() {
            rm -rf "$DOCKER_CONFIG_DIR"
          }
          trap cleanup_remote EXIT

          cd "$DEPLOY_PATH"
          IMAGE_REF="$IMAGE_REF" DOCKER_CONFIG="$DOCKER_CONFIG_DIR" docker pull --platform linux/arm64 "$IMAGE_REF"
          
          # Hentikan container lama jika ada
          docker stop ta-aswan-app 2>/dev/null || true
          docker rm ta-aswan-app 2>/dev/null || true
          
          # Jalankan container baru
          docker run -d \
            --name ta-aswan-app \
            --env-file .env \
            --restart unless-stopped \
            -p 8080:80 \
            "$IMAGE_REF"

          echo "Deployment successful."
          EOF
