name: Deploy ta-aswan

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ta-aswan

permissions:
  contents: read

concurrency:
  group: ta-aswan-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.vars.outputs.image_ref }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive image tag
        id: vars
        run: |
          IMAGE_TAG="$(git rev-parse --short=7 "$GITHUB_SHA")"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_NAME}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.image_ref }},${{ env.IMAGE_NAME }}:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_vm:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build_and_push
    environment:
      name: production

    steps:
      - name: Parse SSH Target
        run: |
          if [[ "${{ secrets.VM_SSH_TARGET }}" =~ ^([^@]+)@([^:]+):([0-9]+)$ ]]; then
            echo "VM_USER=${BASH_REMATCH[1]}" >> $GITHUB_ENV
            echo "VM_HOST=${BASH_REMATCH[2]}" >> $GITHUB_ENV
            echo "VM_PORT=${BASH_REMATCH[3]}" >> $GITHUB_ENV
          else
            echo "Error: VM_SSH_TARGET must be in format user@host:port" >&2
            exit 1
          fi

      - name: Prepare Configurations
        env:
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          mkdir -p .deploy
          printf "%s\n" "$APP_ENV_FILE" > .deploy/.env
          cat << 'EOF' > .deploy/docker-compose.yml
          services:
            app:
              image: ${{ needs.build_and_push.outputs.image_ref }}
              container_name: ta-aswan
              restart: unless-stopped
              env_file:
                - .env
              volumes:
                - ta-aswan-writable:/var/www/html/writable
              networks:
                - proxy
              healthcheck:
                test: ["CMD-SHELL", "wget -qO- --header='User-Agent: Docker-Healthcheck' http://localhost/health > /dev/null 2>&1 || exit 1"]
                interval: 30s
                timeout: 10s
                retries: 3
                start_period: 20s
          
          volumes:
            ta-aswan-writable:
              name: ta-aswan-writable
          
          networks:
            proxy:
              external: true
          EOF

      - name: Copy Files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          port: ${{ env.VM_PORT }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: ".deploy/*"
          target: "/opt/ta-aswan"
          strip_components: 1

      - name: Execute Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ env.VM_USER }}
          port: ${{ env.VM_PORT }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/ta-aswan
            docker pull --platform linux/arm64 ${{ needs.build_and_push.outputs.image_ref }}
            docker compose up -d --remove-orphans
            echo "Deployment successful."
